:root[data-theme=&quot;light&quot;] {
  color-scheme: light;
}

:root[data-theme=&quot;dark&quot;] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: var(--muted-foreground);
}

.form-control[type=&quot;file&quot;] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);
}

.form-control[type=&quot;file&quot;]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type=&quot;checkbox&quot;]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: &quot;&quot;;
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type=&quot;radio&quot;] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type=&quot;radio&quot;]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);

        &lt;p&gt;С глаголом &lt;strong&gt;to be&lt;/strong&gt;: &lt;span class=&quot;eh-formula&quot;&gt;подлежащее + to be + наречие&lt;/span&gt;&lt;br&gt;&lt;em&gt;He is always friendly.&lt;/em&gt;&lt;/p&gt;
        &lt;p&gt;С другими глаголами: &lt;span class=&quot;eh-formula&quot;&gt;подлежащее + наречие + глагол&lt;/span&gt;&lt;br&gt;&lt;em&gt;I often watch football on TV.&lt;/em&gt;&lt;/p&gt;
      &lt;/div&gt;
      &lt;p class=&quot;eh-example&quot;&gt;&lt;strong&gt;Пример 0:&lt;/strong&gt; правильный вариант — &lt;em&gt;I often eat ice cream.&lt;/em&gt;&lt;/p&gt;
      &lt;div class=&quot;eh-choice-list&quot; id=&quot;eh-gir&quot;&gt;
        &lt;div class=&quot;eh-choice-item&quot; data-answer=&quot;b&quot;&gt;&lt;span class=&quot;eh-index&quot;&gt;1&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;eh-options&quot;&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir1&quot; value=&quot;a&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;a&lt;/span&gt; I play often computer games.&lt;/span&gt;&lt;/label&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir1&quot; value=&quot;b&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;b&lt;/span&gt; I often play computer games.&lt;/span&gt;&lt;/label&gt;&lt;/div&gt;&lt;p class=&quot;eh-feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;eh-choice-item&quot; data-answer=&quot;a&quot;&gt;&lt;span class=&quot;eh-index&quot;&gt;2&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;eh-options&quot;&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir2&quot; value=&quot;a&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;a&lt;/span&gt; I always go to the cinema with my friends.&lt;/span&gt;&lt;/label&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir2&quot; value=&quot;b&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;b&lt;/span&gt; Always I go to the cinema with my friends.&lt;/span&gt;&lt;/label&gt;&lt;/div&gt;&lt;p class=&quot;eh-feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;eh-choice-item&quot; data-answer=&quot;a&quot;&gt;&lt;span class=&quot;eh-index&quot;&gt;3&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;eh-options&quot;&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir3&quot; value=&quot;a&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;a&lt;/span&gt; That singer is always great.&lt;/span&gt;&lt;/label&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir3&quot; value=&quot;b&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;b&lt;/span&gt; That singer always is great.&lt;/span&gt;&lt;/label&gt;&lt;/div&gt;&lt;p class=&quot;eh-feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;eh-choice-item&quot; data-answer=&quot;b&quot;&gt;&lt;span class=&quot;eh-index&quot;&gt;4&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;eh-options&quot;&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir4&quot; value=&quot;a&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;a&lt;/span&gt; I ride a bike in the park never.&lt;/span&gt;&lt;/label&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir4&quot; value=&quot;b&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;b&lt;/span&gt; I never ride a bike in the park.&lt;/span&gt;&lt;/label&gt;&lt;/div&gt;&lt;p class=&quot;eh-feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;eh-choice-item&quot; data-answer=&quot;b&quot;&gt;&lt;span class=&quot;eh-index&quot;&gt;5&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;eh-options&quot;&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir5&quot; value=&quot;a&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;a&lt;/span&gt; I sometimes am bored.&lt;/span&gt;&lt;/label&gt;&lt;label class=&quot;eh-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;gir5&quot; value=&quot;b&quot;&gt;&lt;span&gt;&lt;span class=&quot;eh-option-letter&quot;&gt;b&lt;/span&gt; I am sometimes bored.&lt;/span&gt;&lt;/label&gt;&lt;/div&gt;&lt;p class=&quot;eh-feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;
  &lt;/main&gt;

  &lt;div class=&quot;eh-actions&quot;&gt;
    &lt;button class=&quot;eh-primary&quot; id=&quot;eh-check&quot; type=&quot;button&quot;&gt;Проверить работу&lt;/button&gt;
    &lt;button class=&quot;eh-secondary&quot; id=&quot;eh-reset&quot; type=&quot;button&quot;&gt;Начать заново&lt;/button&gt;
  &lt;/div&gt;
  &lt;div class=&quot;eh-result&quot; id=&quot;eh-result&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;english-homework-app&#x27;);
      if (!root) return;
      const storageKey = &#x27;english-homework-unit5-v1&#x27;;
      const inputs = [...root.querySelectorAll(&#x27;input&#x27;)];
      const normalize = (value) =&gt; value.toLowerCase().replace(/[’‘]/g, &quot;&#x27;&quot;).replace(/[?.!,]/g, &#x27;&#x27;).replace(/\s+/g, &#x27; &#x27;).trim();

      function save() {
        const state = inputs.map((input) =&gt; input.type === &#x27;radio&#x27; ? input.checked : input.value);
        try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch (_) {}
        updateProgress();
      }

      function load() {
        try {
          const state = JSON.parse(localStorage.getItem(storageKey) || &#x27;null&#x27;);
          if (!Array.isArray(state)) return;
          inputs.forEach((input, index) =&gt; {
            if (input.type === &#x27;radio&#x27;) input.checked = Boolean(state[index]);
            else if (typeof state[index] === &#x27;string&#x27;) input.value = state[index];
          });
        } catch (_) {}
      }

      function completedCount() {
        const ex9 = [...root.querySelectorAll(&#x27;#eh-ex9 input&#x27;)].filter(input =&gt; input.value.trim()).length;
        const ex10 = [...root.querySelectorAll(&#x27;#eh-ex10 .eh-item&#x27;)].filter(item =&gt; item.querySelector(&#x27;.eh-q&#x27;).value.trim() &amp;&amp; item.querySelector(&#x27;.eh-a&#x27;).value.trim()).length;
        const gir = [...root.querySelectorAll(&#x27;#eh-gir .eh-choice-item&#x27;)].filter(item =&gt; item.querySelector(&#x27;input:checked&#x27;)).length;
        return ex9 + ex10 + gir;
      }

      function updateProgress() {
        const done = completedCount();
        root.querySelector(&#x27;#eh-progress-text&#x27;).textContent = `${done} из 15`;
        root.querySelector(&#x27;#eh-progress-bar&#x27;).style.width = `${done / 15 * 100}%`;
      }

      function setFeedback(item, ok, message) {
        const feedback = item.querySelector(&#x27;.eh-feedback&#x27;);
        feedback.className = `eh-feedback ${ok ? &#x27;correct&#x27; : &#x27;wrong&#x27;}`;
        feedback.textContent = message;
      }

      function clearMarks() {
        root.querySelectorAll(&#x27;.is-correct, .is-wrong&#x27;).forEach(el =&gt; el.classList.remove(&#x27;is-correct&#x27;, &#x27;is-wrong&#x27;));
        root.querySelectorAll(&#x27;.eh-feedback&#x27;).forEach(el =&gt; { el.className = &#x27;eh-feedback&#x27;; el.textContent = &#x27;&#x27;; });
      }

      function check() {
        clearMarks();
        let correct = 0;
        const total = 15;

        root.querySelectorAll(&#x27;#eh-ex9 .eh-item&#x27;).forEach(item =&gt; {
          const input = item.querySelector(&#x27;input&#x27;);
          const expected = item.dataset.answer;
          const ok = normalize(input.value) === expected;
          input.classList.add(ok ? &#x27;is-correct&#x27; : &#x27;is-wrong&#x27;);
          setFeedback(item, ok, ok ? &#x27;Верно!&#x27; : `Попробуй ещё раз: здесь нужно ${expected === &#x27;do&#x27; ? &#x27;Do&#x27; : &#x27;Does&#x27;}.`);
          if (ok) correct++;
        });

        root.querySelectorAll(&#x27;#eh-ex10 .eh-item&#x27;).forEach(item =&gt; {
          const q = item.querySelector(&#x27;.eh-q&#x27;);
          const a = item.querySelector(&#x27;.eh-a&#x27;);
          const questionOk = normalize(q.value) === item.dataset.question;
          const answerOk = a.value.trim().length &gt; 0;
          q.classList.add(questionOk ? &#x27;is-correct&#x27; : &#x27;is-wrong&#x27;);
          a.classList.add(answerOk ? &#x27;is-correct&#x27; : &#x27;is-wrong&#x27;);
          if (questionOk &amp;&amp; answerOk) {
            setFeedback(item, true, &#x27;Вопрос составлен верно, личный ответ записан.&#x27;);
            correct++;
          } else if (!questionOk) {
            const model = item.dataset.question.replace(/^./, c =&gt; c.toUpperCase()) + &#x27;?&#x27;;
            setFeedback(item, false, `Проверь порядок слов. Правильный вопрос: ${model}`);
          } else {
            setFeedback(item, false, &#x27;Вопрос верный. Теперь напиши личный ответ.&#x27;);
          }
        });

        root.querySelectorAll(&#x27;#eh-gir .eh-choice-item&#x27;).forEach(item =&gt; {
          const checked = item.querySelector(&#x27;input:checked&#x27;);
          const ok = Boolean(checked &amp;&amp; checked.value === item.dataset.answer);
          if (checked) checked.closest(&#x27;.eh-option&#x27;).classList.add(ok ? &#x27;is-correct&#x27; : &#x27;is-wrong&#x27;);
          setFeedback(item, ok, ok ? &#x27;Верно!&#x27; : checked ? &#x27;Проверь место наречия в предложении.&#x27; : &#x27;Выбери один вариант.&#x27;);
          if (ok) correct++;
        });

        const percent = Math.round(correct / total * 100);
        const result = root.querySelector(&#x27;#eh-result&#x27;);
        const message = correct === total ? &#x27;Отлично — всё правильно!&#x27; : correct &gt;= 12 ? &#x27;Очень хорошо! Исправь отмеченные места.&#x27; : &#x27;Хорошее начало. Посмотри подсказки и попробуй ещё раз.&#x27;;
        result.innerHTML = `&lt;strong&gt;${correct} из ${total} · ${percent}%&lt;/strong&gt;&lt;br&gt;${message}`;
        result.classList.add(&#x27;show&#x27;);
        result.scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;nearest&#x27; });
        save();
      }

      function reset() {
        if (!window.confirm(&#x27;Удалить все введённые ответы и начать заново?&#x27;)) return;
        inputs.forEach(input =&gt; { if (input.type === &#x27;radio&#x27;) input.checked = false; else input.value = &#x27;&#x27;; });
        clearMarks();
        root.querySelector(&#x27;#eh-result&#x27;).classList.remove(&#x27;show&#x27;);
        try { localStorage.removeItem(storageKey); } catch (_) {}
        updateProgress();
      }

      inputs.forEach(input =&gt; input.addEventListener(&#x27;input&#x27;, save));
      inputs.forEach(input =&gt; input.addEventListener(&#x27;change&#x27;, save));
      root.querySelector(&#x27;#eh-check&#x27;).addEventListener(&#x27;click&#x27;, check);
      root.querySelector(&#x27;#eh-reset&#x27;).addEventListener(&#x27;click&#x27;, reset);
      load();
      updateProgress();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();

    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
